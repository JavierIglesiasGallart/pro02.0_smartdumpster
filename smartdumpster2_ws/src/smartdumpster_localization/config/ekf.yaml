ekf_filter_node_global:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: smartdumpster_controller/odom
    odom0_config: [false,  false,  false,
                  false, false, true,
                  true,  false,  false,
                  false, false, true,
                  false, false, false]
    odom0_differential: false

    imu0: zed/imu/out
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true

    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false


navsat_transform:
  ros__parameters:
    use_sim_time: true
    frequency: 10.0
    delay: 0.0
    
    map_frame: map
    odom_frame: odom
    world_frame: map

    magnetic_declination_radians: 0.0261799
    
    # yaw_offset: -1.570796327

    use_odometry_yaw: true
    
    zero_altitude: true
    
    publish_filtered_gps: true
    broadcast_cartesian_transform: true

    datum: [41.644262795596774, -0.9034251889709917, 0.0] # Centro campo de fútbol de Salesianos Zaragoza, en coordenadas WGS84 (latitud, longitud, altitud)